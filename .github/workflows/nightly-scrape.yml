name: Nightly Agenda Scrape

on:
  schedule:
    # 11 PM UTC (6 PM EST / 7 PM EDT) every day
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agenda-scraper

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agenda-scraper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Scrape meetings
        run: node json-scraper.js

      - name: Check for changes
        id: git-check
        working-directory: .
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --staged --name-only
          fi

      - name: Analyze changes for notifications
        if: steps.git-check.outputs.has_changes == 'true'
        id: analyze
        working-directory: .
        run: |
          NEW_MEETINGS=""
          MODIFIED_MEETINGS=""
          HAS_MEANINGFUL=false

          # New meeting files
          for file in $(git diff --staged --diff-filter=A --name-only -- 'agenda-scraper/data/meeting_*.json'); do
            HAS_MEANINGFUL=true
            MEETING_ID=$(echo "$file" | sed 's/.*meeting_\([0-9]*\)_.*/\1/')
            MEETING_DATE=$(echo "$file" | sed 's/.*meeting_[0-9]*_\(.*\)\.json/\1/')
            # Read meeting type from the new file
            MEETING_TYPE=$(node -p "JSON.parse(require('fs').readFileSync('$file','utf-8')).meetingType || 'unknown'")
            NEW_MEETINGS="${NEW_MEETINGS}- **Meeting ${MEETING_ID}** — ${MEETING_DATE} (${MEETING_TYPE})"$'\n'
          done

          # Modified meeting files — use diff-without-urls.js to filter URL-only changes
          for file in $(git diff --staged --diff-filter=M --name-only -- 'agenda-scraper/data/meeting_*.json'); do
            DIFF_OUTPUT=$(git show HEAD:"$file" | node agenda-scraper/diff-without-urls.js --summary - "$file" 2>/dev/null || echo "")
            if [[ -n "$DIFF_OUTPUT" && "$DIFF_OUTPUT" != *"No meaningful changes"* ]]; then
              HAS_MEANINGFUL=true
              MEETING_ID=$(echo "$file" | sed 's/.*meeting_\([0-9]*\)_.*/\1/')
              MEETING_DATE=$(echo "$file" | sed 's/.*meeting_[0-9]*_\(.*\)\.json/\1/')
              MODIFIED_MEETINGS="${MODIFIED_MEETINGS}### Meeting ${MEETING_ID} (${MEETING_DATE})"$'\n'"${DIFF_OUTPUT}"$'\n\n'
            fi
          done

          if [[ "$HAS_MEANINGFUL" == "true" ]]; then
            echo "has_meaningful=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Nightly Scrape — Changes Detected"
              echo ""
              if [[ -n "$NEW_MEETINGS" ]]; then
                echo "### New Meetings"
                echo "$NEW_MEETINGS"
              fi
              if [[ -n "$MODIFIED_MEETINGS" ]]; then
                echo "### Modified Meetings"
                echo "$MODIFIED_MEETINGS"
              fi
              echo "---"
              echo "*Auto-generated by nightly scrape workflow*"
            } > /tmp/issue-body.md
          else
            echo "has_meaningful=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.has_changes == 'true'
        working-directory: .
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "📋 Agenda data update $(date +%Y-%m-%d)"
          git push

      - name: Create notification issue
        if: steps.analyze.outputs.has_meaningful == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: .
        run: |
          gh issue create \
            --title "📋 Agenda changes detected $(date +%Y-%m-%d)" \
            --body-file /tmp/issue-body.md
